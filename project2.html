<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI Calculator</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #2D9CDB, #14B8A6);
}

.container {
    width: 100%;
    display: flex;
    justify-content: center;
}

.card {
    display: flex;
    width: 900px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.25);
    overflow: hidden;
}

/* LEFT SIDE */

.left {
    flex: 1;
    padding: 50px;
}

.left h1 {
    margin-bottom: 30px;
    color: #2D9CDB;
}

.left label {
    display: block;
    margin-top: 15px;
    font-weight: 600;
}

.left input {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 15px;
    transition: 0.3s ease;
}

.left input:focus {
    border-color: #2D9CDB;
    box-shadow: 0 0 10px rgba(45,156,219,0.4);
    outline: none;
}

.left button {
    width: 100%;
    padding: 14px;
    margin-top: 25px;
    background: linear-gradient(135deg, #2D9CDB, #1E88E5);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s ease;
}

.left button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

/* RESULT */

#results {
    margin-top: 25px;
    font-size: 20px;
    font-weight: bold;
    color: #14B8A6;
}

/* GUIDE */

#weight-guide {
    margin-top: 25px;
    font-size: 14px;
    color: #555;
}

/* RIGHT SIDE */

.right {
    flex: 1;
    background: #F5FAFF;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 30px;
}

.right img {
    width: 100%;
    max-width: 350px;
    border-radius: 20px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.2);
}

/* RESPONSIVE */

@media (max-width: 768px) {
    .card {
        flex-direction: column;
        width: 95%;
    }

    .right {
        padding: 20px;
    }
}

</style>
</head>

<body>

<div class="container">
    <div class="card">

        <!-- LEFT SIDE -->
        <div class="left">
            <h1>BMI Calculator</h1>

            <form>
                <label>Height in CM:</label>
                <input type="text" id="height" placeholder="Enter height">

                <label>Weight in KG:</label>
                <input type="text" id="weight" placeholder="Enter weight">

                <button type="submit">Calculate</button>

                <div id="results"></div>

                <div id="weight-guide">
                    <h3><i>BMI Weight Guide</i></h3>
                    <p>Under Weight = less than 18.6</p>
                    <p>Normal Weight = 18.6 - 24.9</p>
                    <p>Overweight = greater than 24.9</p>
                </div>
            </form>
        </div>

        <!-- RIGHT SIDE -->
        <div class="right">
            <img src="https://media.istockphoto.com/id/528072248/photo/bmi-body-mass-index-written-on-a-notepad-sheet.webp?a=1&b=1&s=612x612&w=0&k=20&c=1mMCeNsFY5TsOYJXHt98jMuIjuKYGAzMLBuefvLIcx8=" alt="BMI Image">
        </div>

    </div>
</div>

</body>

<script>
    const form = document.querySelector("form");
    //const button = document.querySelector(button);

    //This usecase will give you empty value
    //const height = parseInt(document.querySelector("#height").value);


    

    form.addEventListener('submit',function(e){
        e.preventDefault();

        //is value p wo event ho
    const height = parseInt(document.querySelector("#height").value);
    const weight = parseInt(document.querySelector("#weight").value);
    const results = document.querySelector("#results");

    if(height ==='' || height<0 || isNaN(height)){
        results.innerHTML = "Please give a valid height";
    }

    else if(weight==='' || weight<0 || isNaN(weight)){
        results.innerHTML = "Please give a valid weight";
    }

    else{

        const formula = weight/((height*height)/10000).toFixed(2);
        results.innerHTML = `<span>${formula}</span>`;
    
     if(formula < 18.6){
            results.textContent = (`${formula} is underweight`)
        }
        else if(formula >=  18.6 && formula <= 24.9){
            results.textContent = (`${formula} is Normal weight`)
        }
         else{
            results.textContent = (`${formula} is overweight`)
        }
    }
    });


</script>
</html>
