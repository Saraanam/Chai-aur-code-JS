    <h1>Learning promise</h1>

<script>
 const promiseOne = new Promise(function(resolve,reject){
    setTimeout(function(){
        console.log('Async task is complete');
        resolve();
    },1000)
})

//.then connects with resolve in the function
promiseOne.then(function(){
    console.log("Promise consumed");
})

new Promise(function(resolve,reject){
    setTimeout(function(){
        console.log('Asynch task 2');
        resolve()
    },1000)
}).then (function(){
    console.log("Asunch 2 resolved");
})

const promiseThree = new Promise(function(resolve,reject){
    setTimeout(function(){
        console.log({username: "SARA" , email:"saaanam687@gmail.com"})
    },1000)
})

promiseThree.then(function(user){
    console.log(user);
})

const promiseFour = new Promise(function(resolve,reject){
    setTimeout(function(){
        let error = false;
        if(!error){
            resolve({username:"Sara" , password:"123"})
        }else{
            reject('Error: something went wrong')
        }
    },1000)
})
promiseFour
.then((user) =>{
    console.log(user);
    return user.username
})
.then((username)=>{
    console.log(username);
})
.catch(function(error){
    console.log(error);
})
.finally(() => {
    console.log("The promise is either resolved or rejected");
})

const promiseFive = new Promise(function(resolve,reject){
    setTimeout(function(){
        let error = false; //true 
        if(!error){
            resolve({username:"Javascript",password:"123"});
        }else{
            reject("ERROR: Js went wrong");
        }
    },1000)
}) 

async function consumePromiseFive(){
    try{
        const response = await promiseFive
        console.log(response);
    }catch(error){
        console.log(error);
    }
}
consumePromiseFive()
